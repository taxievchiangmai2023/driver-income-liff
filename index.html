<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ระบบส่งยอดรายได้คนขับ</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <style>
        body { background-color: #f0f2f5; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        .main-card { border: none; border-radius: 20px; box-shadow: 0 8px 24px rgba(0,0,0,0.1); background: white; }
        .btn-submit { background-color: #00b900; color: white; border: none; padding: 15px; border-radius: 12px; font-weight: 700; transition: 0.3s; }
        .btn-submit:hover { background-color: #009900; transform: translateY(-2px); color: white; }
        .loader-wrapper { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #ffffff; z-index: 9999; display: flex; flex-direction: column; justify-content: center; align-items: center; }
        .form-label { font-weight: 600; color: #4a4a4a; }
        input.form-control { border-radius: 10px; padding: 12px; border: 1px solid #ddd; }
        .driver-badge { background: #e8f5e9; color: #2e7d32; padding: 5px 15px; border-radius: 20px; font-size: 0.85rem; font-weight: 600; }
    </style>
</head>
<body>

    <div id="loader" class="loader-wrapper">
        <div class="spinner-border text-success mb-3" role="status"></div>
        <h5 class="text-secondary">กำลังตรวจสอบสิทธิ์...</h5>
    </div>

    <div id="app-content" class="container py-4" style="display: none;">
        <div class="main-card p-4">
            <div class="d-flex justify-content-between align-items-center mb-3">
                <h4 class="mb-0">ส่งยอดรายได้</h4>
                <span id="u_type" class="driver-badge">...</span>
            </div>
            <p class="text-muted mb-4">คุณ: <strong id="u_name">...</strong> | ทะเบียน: <strong id="u_plate">...</strong></p>
            <hr>

            <form id="incomeForm">
                <div class="mb-4">
                    <label class="form-label">🗓 ยอดของวันที่</label>
                    <input type="date" id="report_date" class="form-control" required>
                </div>

                <div id="section_app" style="display: none;">
                    <div class="row g-3">
                        <div class="col-6">
                            <label class="form-label">Grab</label>
                            <input type="number" id="grab" class="form-control" value="0" step="any">
                        </div>
                        <div class="col-6">
                            <label class="form-label">Bolt</label>
                            <input type="number" id="bolt" class="form-control" value="0" step="any">
                        </div>
                        <div class="col-6">
                            <label class="form-label">Maxim</label>
                            <input type="number" id="maxim" class="form-control" value="0" step="any">
                        </div>
                        <div class="col-6">
                            <label class="form-label">Indriver</label>
                            <input type="number" id="indriver" class="form-control" value="0" step="any">
                        </div>
                        <div class="col-6">
                            <label class="form-label">Lineman</label>
                            <input type="number" id="lineman" class="form-control" value="0" step="any">
                        </div>
                        <div class="col-6">
                            <label class="form-label">งานนอก</label>
                            <input type="number" id="outside" class="form-control" value="0" step="any">
                        </div>
                    </div>
                </div>

                <div id="section_airport" style="display: none;">
                    <div class="mb-3">
                        <label class="form-label">✈️ ยอดสนามบิน (ระบุสูตรได้)</label>
                        <input type="text" id="airport_calc" class="form-control" placeholder="เช่น 150*6+250*3+400">
                        <div class="form-text">ระบบจะคำนวณผลลัพธ์ให้โดยอัตโนมัติ</div>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">📦 งานเหมา (ถ้ามี)</label>
                        <input type="number" id="mao" class="form-control" value="0" step="any">
                    </div>
                </div>

                <button type="submit" id="btnSubmit" class="btn btn-submit w-100 mt-4">ยืนยันและส่งข้อมูล</button>
            </form>
        </div>
    </div>

    <script>
        // ---------------------------------------------------------
        // แก้ไขค่า 2 บรรทัดนี้ให้เป็นของคุณ
        const LIFF_ID = "2009388959-5qMzDchY"; 
        const GAS_URL = "https://script.google.com/macros/s/AKfycby4twdAiiXSiK6HPL6-06JiWrKxdP4_yqA2Aho8xMVz4SPxFHrcvJsIS0Anklwyg24h/exec";
        // ---------------------------------------------------------

        let driverData = {};

        async function main() {
            try {
                await liff.init({ liffId: LIFF_ID });
                if (!liff.isLoggedIn()) {
                    liff.login();
                    return;
                }

                const profile = await liff.getProfile();
                
                // ดึงข้อมูลคนขับและเช็คสถานะ
                const response = await fetch(`${GAS_URL}?uid=${profile.userId}`);
                driverData = await response.json();

                if (driverData.status === "success") {
                    renderUI();
                } else if (driverData.status === "suspended") {
                    alert("❌ บัญชีของคุณถูกระงับการใช้งาน กรุณาติดต่อแอดมิน");
                    liff.closeWindow();
                } else {
                    alert("❓ ไม่พบข้อมูลของคุณในระบบ กรุณาลงทะเบียนก่อน");
                    liff.closeWindow();
                }
            } catch (err) {
                console.error(err);
                alert("⚠️ เกิดข้อผิดพลาดในการเชื่อมต่อ กรุณาลองใหม่");
            }
        }

        function renderUI() {
            document.getElementById('u_name').innerText = driverData.name;
            document.getElementById('u_plate').innerText = driverData.plate;
            document.getElementById('u_type').innerText = driverData.type;
            document.getElementById('report_date').valueAsDate = new Date();

            if (driverData.type === "สนามบิน") {
                document.getElementById('section_airport').style.display = 'block';
            } else {
                document.getElementById('section_app').style.display = 'block';
            }

            document.getElementById('loader').style.display = 'none';
            document.getElementById('app-content').style.display = 'block';
        }

        document.getElementById('incomeForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const btn = document.getElementById('btnSubmit');
            btn.disabled = true;
            btn.innerText = "กำลังส่งข้อมูล...";

            const payload = {
                uid: (await liff.getProfile()).userId,
                name: driverData.name,
                plate: driverData.plate,
                type: driverData.type,
                report_date: document.getElementById('report_date').value,
                grab: parseFloat(document.getElementById('grab')?.value || 0),
                bolt: parseFloat(document.getElementById('bolt')?.value || 0),
                maxim: parseFloat(document.getElementById('maxim')?.value || 0),
                indriver: parseFloat(document.getElementById('indriver')?.value || 0),
                lineman: parseFloat(document.getElementById('lineman')?.value || 0),
                outside: parseFloat(document.getElementById('outside')?.value || 0),
                mao: parseFloat(document.getElementById('mao')?.value || 0),
                airport_calc: document.getElementById('airport_calc')?.value || ""
            };

            try {
                const response = await fetch(GAS_URL, {
                    method: 'POST',
                    body: JSON.stringify(payload)
                });
                const result = await response.json();

                if (result.status === "success") {
                    alert(`✅ บันทึกสำเร็จ!\nยอดที่ต้องโอนคืน: ${result.rental.toLocaleString()} บาท`);
                    liff.closeWindow();
                } else {
                    alert("❌ ผิดพลาด: " + result.message);
                    btn.disabled = false;
                    btn.innerText = "ยืนยันและส่งข้อมูล";
                }
            } catch (err) {
                alert("⚠️ ส่งข้อมูลไม่สำเร็จ กรุณาเช็คอินเทอร์เน็ต");
                btn.disabled = false;
                btn.innerText = "ยืนยันและส่งข้อมูล";
            }
        });

        main();
    </script>
</body>
</html>
