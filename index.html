<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>บันทึกรายได้คนขับ</title>
    <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: #f4f7f6; padding: 20px; }
        .card { border: none; border-radius: 15px; box-shadow: 0 10px 20px rgba(0,0,0,0.05); }
        .btn-success { background: #00b900; border: none; padding: 12px; font-weight: bold; }
    </style>
</head>
<body>
    <div id="loader" class="text-center mt-5"><h4>กำลังตรวจสอบสิทธิ์...</h4></div>

    <div id="app" class="container" style="display:none;">
        <div class="card p-4">
            <h5 class="mb-1">คุณ: <span id="u_name"></span></h5>
            <p class="text-muted small">ทะเบียน: <span id="u_plate"></span> (<span id="u_type"></span>)</p>
            <hr>
            <form id="incomeForm">
                <div class="mb-3">
                    <label class="form-label">วันที่ของยอดเงิน</label>
                    <input type="date" id="report_date" class="form-control" required>
                </div>

                <div id="section_app" style="display:none;">
                    <div class="row g-2">
                        <div class="col-6 mb-2">Grab <input type="number" id="grab" class="form-control" value="0"></div>
                        <div class="col-6 mb-2">Bolt <input type="number" id="bolt" class="form-control" value="0"></div>
                        <div class="col-6 mb-2">Maxim <input type="number" id="maxim" class="form-control" value="0"></div>
                        <div class="col-6 mb-2">Indriver <input type="number" id="indriver" class="form-control" value="0"></div>
                        <div class="col-6 mb-2">Lineman <input type="number" id="lineman" class="form-control" value="0"></div>
                        <div class="col-6 mb-2">งานนอก <input type="number" id="outside" class="form-control" value="0"></div>
                    </div>
                </div>

                <div id="section_airport" style="display:none;">
                    <div class="mb-3">
                        <label>ยอดสนามบิน (เช่น 150*6+250*3)</label>
                        <input type="text" id="airport_calc" class="form-control" placeholder="150*6+250*3">
                    </div>
                    <div class="mb-3">
                        <label>งานเหมา (ถ้ามี)</label>
                        <input type="number" id="mao" class="form-control" value="0">
                    </div>
                </div>

                <button type="submit" class="btn btn-success w-100 mt-3">ส่งยอดข้อมูล</button>
            </form>
        </div>
    </div>

    <script>
        const LIFF_ID = "2009388959-5qMzDchY";
        const GAS_URL = "https://script.google.com/macros/s/AKfycby4twdAiiXSiK6HPL6-06JiWrKxdP4_yqA2Aho8xMVz4SPxFHrcvJsIS0Anklwyg24h/exec";
        let driver = {};

        async function main() {
            await liff.init({ liffId: LIFF_ID });
            if (!liff.isLoggedIn()) { liff.login(); return; }

            const profile = await liff.getProfile();
            const res = await fetch(`${GAS_URL}?uid=${profile.userId}`);
            driver = await res.json();

            if (driver.status === "success") {
                document.getElementById('u_name').innerText = driver.name;
                document.getElementById('u_plate').innerText = driver.plate;
                document.getElementById('u_type').innerText = driver.type;
                
                document.getElementById(driver.type === "สนามบิน" ? 'section_airport' : 'section_app').style.display = 'block';
                document.getElementById('report_date').valueAsDate = new Date();
                document.getElementById('loader').style.display = 'none';
                document.getElementById('app').style.display = 'block';
            } else {
                alert(driver.status === "suspended" ? "❌ บัญชีถูกระงับ" : "❓ ไม่พบชื่อในระบบ");
                liff.closeWindow();
            }
        }

        document.getElementById('incomeForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const profile = await liff.getProfile();
            const payload = {
                uid: profile.userId,
                name: driver.name,
                plate: driver.plate,
                type: driver.type,
                report_date: document.getElementById('report_date').value,
                grab: parseFloat(document.getElementById('grab')?.value || 0),
                bolt: parseFloat(document.getElementById('bolt')?.value || 0),
                maxim: parseFloat(document.getElementById('maxim')?.value || 0),
                indriver: parseFloat(document.getElementById('indriver')?.value || 0),
                lineman: parseFloat(document.getElementById('lineman')?.value || 0),
                outside: parseFloat(document.getElementById('outside')?.value || 0),
                mao: parseFloat(document.getElementById('mao')?.value || 0),
                airport_calc: document.getElementById('airport_calc')?.value || ""
            };

            const response = await fetch(GAS_URL, { method: 'POST', body: JSON.stringify(payload) });
            const result = await response.json();
            if (result.status === "success") {
                alert(`บันทึกสำเร็จ! ยอดเช่า: ${result.rental.toLocaleString()} บ.`);
                liff.closeWindow();
            } else {
                alert("เกิดข้อผิดพลาด: " + result.message);
            }
        });

        main();
    </script>
</body>
</html>
