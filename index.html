<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ระบบส่งยอด TaxiEV</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <style>
        body { background-color: #f0f2f5; font-family: sans-serif; }
        .main-card { border: none; border-radius: 20px; box-shadow: 0 8px 24px rgba(0,0,0,0.1); background: white; }
        .btn-submit { background-color: #00b900; color: white; border: none; padding: 15px; border-radius: 12px; font-weight: 700; width: 100%; }
        .uid-box { background: #fff3cd; color: #856404; padding: 15px; border-radius: 10px; font-family: monospace; word-break: break-all; margin: 15px 0; border: 1px dashed #ffeeba; }
        .required-label::after { content: " *"; color: red; }
    </style>
</head>
<body>

    <div id="loader" class="text-center mt-5">
        <div class="spinner-border text-success"></div>
        <p class="mt-2">กำลังตรวจสอบข้อมูล...</p>
    </div>

    <div id="new-user-screen" class="container py-5" style="display: none;">
        <div class="main-card p-4 text-center">
            <h4 class="text-warning">⚠️ ยังไม่มีข้อมูลในระบบ</h4>
            <p class="text-muted small">กรุณาคัดลอกรหัสนี้ส่งให้แอดมินเพื่อลงทะเบียน</p>
            <div class="uid-box" id="display-uid"></div>
            <p class="small">เมื่อแอดมินเพิ่มชื่อแล้ว คุณจะเข้าใช้งานหน้าส่งยอดได้ทันที</p>
            <button onclick="liff.closeWindow()" class="btn btn-secondary w-100">ปิดหน้าต่าง</button>
        </div>
    </div>

    <div id="app-content" class="container py-4" style="display: none;">
        <div class="main-card p-4">
            <h5 class="mb-0">คุณ: <span id="u_name"></span></h5>
            <p class="text-muted small">ทะเบียน: <span id="u_plate"></span> (<span id="u_type"></span>)</p>
            <hr>
            <form id="incomeForm">
                <label class="form-label font-weight-bold small">ยอดของวันที่</label>
                <input type="date" id="report_date" class="form-control mb-3" required>

                <div class="row g-2 mb-3">
                    <div class="col-6"><label class="small">Grab</label><input type="number" id="grab" class="form-control" placeholder="0" step="any"></div>
                    <div class="col-6"><label class="small">Bolt</label><input type="number" id="bolt" class="form-control" placeholder="0" step="any"></div>
                    <div class="col-6"><label class="small">Maxim</label><input type="number" id="maxim" class="form-control" placeholder="0" step="any"></div>
                    <div class="col-6"><label class="small">Indriver</label><input type="number" id="indriver" class="form-control" placeholder="0" step="any"></div>
                    <div class="col-6"><label class="small">Lineman</label><input type="number" id="lineman" class="form-control" placeholder="0" step="any"></div>
                    <div class="col-6"><label class="small">งานนอก</label><input type="number" id="outside" class="form-control" placeholder="0" step="any"></div>
                </div>

                <div id="airport_section" style="display: none;">
                    <label class="small">✈️ ยอดสนามบิน (โดยใส่ราคาบิล*จำนวนบิล) </label>
                    <input type="text" id="airport_calc" class="form-control mb-3" placeholder="ตัวอย่าง 150*6+200*3+500">
                </div>

                <div class="mb-2">
                    <label class="small">📦 งานเหมา (จำนวนเงิน)</label>
                    <input type="number" id="mao" class="form-control" placeholder="0" step="any">
                </div>

                <div id="mao_location_section" class="mb-4" style="display: none;">
                    <label class="small text-primary required-label">📍 สถานที่ไปรับ-ส่ง (งานเหมา)</label>
                    <input type="text" id="mao_location" class="form-control" placeholder="ระบุ ต้นทาง - ปลายทาง">
                </div>

                <button type="submit" id="btnSubmit" class="btn btn-submit">ยืนยันและส่งข้อมูล</button>
            </form>
        </div>
    </div>

    <script>
        const LIFF_ID = "2009404765-ZiE2cZmu"; 
        const GAS_URL = "https://script.google.com/macros/s/AKfycbxG-5fGF6MFCVeL6i_mo8OL8Nz3uKn5gtEQeeJxbueIBb_Cb3r8d6Ilan9Nxz87UT9onw/exec";
        let driver = {};

        // ตรวจสอบการกรอกงานเหมา เพื่อเปิดช่องระบุสถานที่
        document.getElementById('mao').addEventListener('input', function() {
            const maoVal = parseFloat(this.value) || 0;
            const locSection = document.getElementById('mao_location_section');
            const locInput = document.getElementById('mao_location');
            if (maoVal > 0) {
                locSection.style.display = 'block';
                locInput.setAttribute('required', 'required');
            } else {
                locSection.style.display = 'none';
                locInput.removeAttribute('required');
                locInput.value = '';
            }
        });

        async function main() {
            try {
                await liff.init({ liffId: LIFF_ID });
                if (!liff.isLoggedIn()) { liff.login(); return; }
                const profile = await liff.getProfile();
                const response = await fetch(`${GAS_URL}?uid=${profile.userId}`);
                driver = await response.json();
                document.getElementById('loader').style.display = 'none';
                if (driver.status === "success") {
                    document.getElementById('u_name').innerText = driver.name;
                    document.getElementById('u_plate').innerText = driver.plate;
                    document.getElementById('u_type').innerText = driver.type;
                    if (driver.type === "สนามบิน") document.getElementById('airport_section').style.display = 'block';
                    document.getElementById('report_date').valueAsDate = new Date();
                    document.getElementById('app-content').style.display = 'block';
                } else if (driver.status === "new_user") {
                    document.getElementById('display-uid').innerText = driver.uid;
                    document.getElementById('new-user-screen').style.display = 'block';
                } else {
                    alert("❌ บัญชีถูกระงับ"); liff.closeWindow();
                }
            } catch (err) { alert("เชื่อมต่อผิดพลาด"); }
        }

        document.getElementById('incomeForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('btnSubmit');
            btn.disabled = true; btn.innerText = "กำลังส่ง...";

            const payload = {
                uid: (await liff.getProfile()).userId,
                name: driver.name, plate: driver.plate, type: driver.type,
                report_date: document.getElementById('report_date').value,
                grab: parseFloat(document.getElementById('grab').value) || 0,
                bolt: parseFloat(document.getElementById('bolt').value) || 0,
                maxim: parseFloat(document.getElementById('maxim').value) || 0,
                indriver: parseFloat(document.getElementById('indriver').value) || 0,
                lineman: parseFloat(document.getElementById('lineman').value) || 0,
                outside: parseFloat(document.getElementById('outside').value) || 0,
                mao: parseFloat(document.getElementById('mao').value) || 0,
                mao_location: document.getElementById('mao_location').value || "", // เพิ่มฟิลด์นี้
                airport_calc: document.getElementById('airport_calc')?.value || ""
            };

            const res = await fetch(GAS_URL, { method: 'POST', body: JSON.stringify(payload) });
            const result = await res.json();
            if (result.status === "success") {
                alert(`บันทึกสำเร็จ! ยอดโอน: ${result.rental.toLocaleString()} บ.`);
                liff.closeWindow();
            } else { alert("Error: " + result.message); btn.disabled = false; }
        });
        main();
    </script>
</body>
</html>
