<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TaxiEV V5 - ส่งยอดรายได้</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <style>
        body { background-color: #f8f9fa; }
        .main-card { border: none; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.08); background: #fff; }
        .section-title { font-weight: 700; color: #00b900; border-left: 5px solid #00b900; padding-left: 10px; margin: 20px 0 15px; }
        .btn-submit { background: #00b900; color: #fff; border: none; padding: 15px; border-radius: 12px; font-weight: 700; width: 100%; }
        .loader { position: fixed; top:0; left:0; width:100%; height:100%; background:#fff; z-index:99; display:flex; flex-direction:column; justify-content:center; align-items:center; }
    </style>
</head>
<body>

<div id="loader" class="loader">
    <div class="spinner-border text-success mb-3"></div>
    <p>กำลังเชื่อมต่อระบบ...</p>
</div>

<div id="content" class="container py-4" style="display:none;">
    <div class="main-card p-4">
        <h4 class="mb-0">ส่งยอดประจำวัน</h4>
        <p class="text-muted small">คุณ: <span id="u_name">...</span> | <span id="u_plate">...</span></p>
        <hr>

        <form id="incomeForm">
            <label class="form-label font-weight-bold">🗓 วันที่สรุปยอด</label>
            <input type="date" id="report_date" class="form-control mb-3" required>

            <div class="section-title">รายได้จากแอป</div>
            <div class="row g-2">
                <div class="col-6 mb-2"><label class="small">Grab</label><input type="number" id="grab" class="form-control" placeholder="0" step="any"></div>
                <div class="col-6 mb-2"><label class="small">Bolt</label><input type="number" id="bolt" class="form-control" placeholder="0" step="any"></div>
                <div class="col-6 mb-2"><label class="small">Maxim</label><input type="number" id="maxim" class="form-control" placeholder="0" step="any"></div>
                <div class="col-6 mb-2"><label class="small">Indriver</label><input type="number" id="indriver" class="form-control" placeholder="0" step="any"></div>
                <div class="col-6 mb-2"><label class="small">Lineman</label><input type="number" id="lineman" class="form-control" placeholder="0" step="any"></div>
                <div class="col-6 mb-2"><label class="small">งานนอก</label><input type="number" id="outside" class="form-control" placeholder="0" step="any"></div>
            </div>

            <div id="airport_box" style="display:none;">
                <div class="section-title">ยอดสนามบิน</div>
                <label class="small">✈️ สูตรคำนวณ (เช่น 150*3+200)</label>
                <input type="text" id="airport_calc" class="form-control mb-3" placeholder="กรอกสูตรตัวเลข">
            </div>

            <div class="section-title">งานเหมา</div>
            <input type="number" id="mao" class="form-control" placeholder="ยอดเงินเหมาทั้งหมด">

            <button type="submit" id="btn" class="btn btn-submit mt-4">ยืนยันส่งข้อมูล</button>
        </form>
    </div>
</div>

<script>
    const LIFF_ID = "2009391738-E66HkNih"; 
    const GAS_URL = "https://script.google.com/macros/s/AKfycbwwLvT69pgb0K-uSADdHfFCV23mCZbgRmXrRJa3h2tIIGTnFQucKOROdegD_empt0yxvg/exec";
    let driver = {};

    async function init() {
        try {
            await liff.init({ liffId: LIFF_ID });
            if (!liff.isLoggedIn()) { liff.login(); return; }
            const profile = await liff.getProfile();
            alert("ID ของคุณคือ: " + profile.userId);
            
            const res = await fetch(`${GAS_URL}?uid=${profile.userId}`, { redirect: 'follow' });
            driver = await res.json();

            if (driver.status === "success") {
                document.getElementById('u_name').innerText = driver.name;
                document.getElementById('u_plate').innerText = driver.plate;
                if (driver.type === "สนามบิน") document.getElementById('airport_box').style.display = 'block';
                document.getElementById('report_date').valueAsDate = new Date();
                document.getElementById('loader').style.display = 'none';
                document.getElementById('content').style.display = 'block';
            } else {
                alert(driver.status === "suspended" ? "บัญชีถูกระงับ" : "ไม่พบข้อมูลพนักงาน");
                liff.closeWindow();
            }
        } catch (e) { 
            alert("การเชื่อมต่อผิดพลาด: " + e.message); 
            console.error(e);
        }
    }

    document.getElementById('incomeForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const btn = document.getElementById('btn');
        btn.disabled = true; btn.innerText = "กำลังส่ง...";
        
        const payload = {
            uid: (await liff.getProfile()).userId,
            name: driver.name, plate: driver.plate, type: driver.type,
            report_date: document.getElementById('report_date').value,
            grab: parseFloat(document.getElementById('grab').value) || 0,
            bolt: parseFloat(document.getElementById('bolt').value) || 0,
            maxim: parseFloat(document.getElementById('maxim').value) || 0,
            indriver: parseFloat(document.getElementById('indriver').value) || 0,
            lineman: parseFloat(document.getElementById('lineman').value) || 0,
            outside: parseFloat(document.getElementById('outside').value) || 0,
            mao: parseFloat(document.getElementById('mao').value) || 0,
            airport_calc: document.getElementById('airport_calc')?.value || ""
        };

        try {
            const res = await fetch(GAS_URL, { 
                method: 'POST', 
                body: JSON.stringify(payload),
                redirect: 'follow' 
            });
            const result = await res.json();
            if (result.status === "success") {
                alert("บันทึกเรียบร้อย! เช็คยอดใน LINE ได้เลย");
                liff.closeWindow();
            } else { alert("Error: " + result.message); btn.disabled = false; }
        } catch (e) { alert("ส่งข้อมูลไม่สำเร็จ: " + e.message); btn.disabled = false; }
    });

    init();
</script>
</body>
</html>
