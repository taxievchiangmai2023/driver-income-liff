<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ส่งยอดรายวัน - TaxiEV</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <style>
        :root { --brand-dark: #13444B; --brand-light: #4EB1B3; --bg-light: #f4f7f6; }
        body { background-color: var(--bg-light); font-family: 'Kanit', sans-serif; padding-bottom: 40px; }
        .brand-header { background: linear-gradient(135deg, var(--brand-dark), var(--brand-light)); color: white; padding: 30px 20px 40px; border-bottom-left-radius: 30px; border-bottom-right-radius: 30px; text-align: center; box-shadow: 0 4px 15px rgba(0,0,0,0.1); position: relative; overflow: hidden; }
        .brand-header::after { content: ''; position: absolute; top: -50px; right: -50px; width: 150px; height: 150px; background: rgba(255,255,255,0.1); transform: rotate(45deg); }
        .card-custom { background: white; border-radius: 15px; padding: 20px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); border: none; margin-top: -20px; margin-bottom: 15px; position: relative; z-index: 10; }
        .form-section { background: white; border-radius: 15px; padding: 15px; margin-bottom: 15px; box-shadow: 0 2px 8px rgba(0,0,0,0.05); border-left: 4px solid var(--brand-light); }
        .form-label { font-weight: bold; color: var(--brand-dark); font-size: 0.9rem; margin-bottom: 5px; }
        .form-control { border-radius: 10px; background-color: #f8f9fa; border: 1px solid #dee2e6; }
        .form-control:focus { border-color: var(--brand-light); box-shadow: 0 0 0 0.2rem rgba(78, 177, 179, 0.25); }
        .btn-brand { background-color: var(--brand-dark); color: white; border-radius: 10px; padding: 12px; font-weight: bold; width: 100%; border: none; transition: 0.3s; }
        .btn-brand:hover { background-color: var(--brand-light); color: white; }
    </style>
</head>
<body>
    <div class="brand-header">
        <h3 class="fw-bold mb-0">TAXI EV</h3>
        <p class="mb-0 opacity-75">CHIANG MAI</p>
    </div>

    <div class="container">
        <div id="loader" class="text-center py-5 mt-4"><div class="spinner-border text-info"></div><p class="mt-2 text-muted">กำลังตรวจสอบข้อมูล...</p></div>
        
        <form id="reportForm" style="display:none;">
            <div class="card-custom text-center">
                <h5 class="fw-bold text-dark mb-1" id="driverName">...</h5>
                <span class="badge bg-secondary" id="driverPlate">...</span>
                <span class="badge" style="background-color: var(--brand-light);" id="driverType">...</span>
                <input type="hidden" id="uid"><input type="hidden" id="name"><input type="hidden" id="plate"><input type="hidden" id="type">
            </div>

            <div class="form-section" style="border-left-color: #6c757d;">
                <label class="form-label">วันที่ส่งยอด</label>
                <input type="date" id="report_date" class="form-control" required>
            </div>

            <div class="form-section">
                <h6 class="fw-bold mb-3" style="color: var(--brand-light);">📱 รายได้จากแอปพลิเคชัน</h6>
                <div class="row g-2">
                    <div class="col-6"><label class="form-label">Grab</label><input type="number" id="grab" class="form-control" placeholder="0" step="any"></div>
                    <div class="col-6"><label class="form-label">Bolt</label><input type="number" id="bolt" class="form-control" placeholder="0" step="any"></div>
                    <div class="col-6"><label class="form-label">Maxim</label><input type="number" id="maxim" class="form-control" placeholder="0" step="any"></div>
                    <div class="col-6"><label class="form-label">InDriver</label><input type="number" id="indriver" class="form-control" placeholder="0" step="any"></div>
                    <div class="col-12"><label class="form-label">LINE MAN</label><input type="number" id="lineman" class="form-control" placeholder="0" step="any"></div>
                </div>
            </div>

            <div class="form-section" style="border-left-color: #ffc107;">
                <h6 class="text-warning fw-bold mb-3">🚕 งานนอกระบบ / เหมา</h6>
                <div class="row g-2">
                    <div class="col-6"><label class="form-label">งานนอก</label><input type="number" id="outside" class="form-control" placeholder="0" step="any"></div>
                    <div class="col-6"><label class="form-label">งานเหมา</label><input type="number" id="mao" class="form-control" placeholder="0" step="any"></div>
                    <div class="col-12"><label class="form-label">สถานที่เหมา (ถ้ามี)</label><input type="text" id="mao_location" class="form-control" placeholder="เช่น เชียงใหม่-ปาย"></div>
                </div>
            </div>

            <div class="form-section" id="airportSection" style="display:none; border-left-color: #198754;">
                <h6 class="text-success fw-bold mb-3">✈️ งานสนามบิน</h6>
                <label class="form-label">ยอดหักเข้าสนามบิน (ใส่สูตรได้)</label>
                <input type="text" id="airport_calc" class="form-control" placeholder="เช่น 150+150">
            </div>

            <button type="submit" id="btnSubmit" class="btn btn-brand mt-3 shadow-sm">ส่งยอดรายวัน</button>
        </form>
    </div>

    <script>
        const LIFF_ID = "2009404765-ZiE2cZmu"; 
        const GAS_URL = "https://script.google.com/macros/s/AKfycbxG-5fGF6MFCVeL6i_mo8OL8Nz3uKn5gtEQeeJxbueIBb_Cb3r8d6Ilan9Nxz87UT9onw/exec";
        
        async function main() {
            await liff.init({ liffId: LIFF_ID });
            if (!liff.isLoggedIn()) { liff.login(); return; }
            const profile = await liff.getProfile();
            document.getElementById('uid').value = profile.userId;
            const now = new Date(); const yyyy = now.getFullYear();
            const mm = String(now.getMonth() + 1).padStart(2, '0'); const dd = String(now.getDate()).padStart(2, '0');
            document.getElementById('report_date').value = `${yyyy}-${mm}-${dd}`;
            checkUser(profile.userId);
        }

        async function checkUser(uid) {
            try {
                const res = await fetch(`${GAS_URL}?uid=${uid}`); 
                const data = await res.json();
                
                if (data.status === "success") {
                    // 1. ใช้งานได้ปกติ
                    document.getElementById('driverName').innerText = data.name; 
                    document.getElementById('driverPlate').innerText = data.plate;
                    document.getElementById('driverType').innerText = data.type;
                    document.getElementById('name').value = data.name; 
                    document.getElementById('plate').value = data.plate; 
                    document.getElementById('type').value = data.type;
                    
                    if(data.type === "สนามบิน") document.getElementById('airportSection').style.display = 'block';
                    
                    document.getElementById('loader').style.display = 'none'; 
                    document.getElementById('reportForm').style.display = 'block';
                    
                } else if (data.status === "suspended") {
                    // 2. 🚫 โดนระงับการใช้งาน (InActive)
                    document.getElementById('reportForm').style.display = 'none';
                    document.getElementById('loader').innerHTML = `
                        <div style="background: white; border-radius: 15px; padding: 25px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); margin-top: 20px; border-top: 5px solid #dc3545; text-align: center;">
                            <h4 class="fw-bold text-danger mb-3">🚫 บัญชีถูกระงับ</h4>
                            <p class="text-muted mb-0">ผู้ใช้ถูกระงับการใช้งาน<br>กรุณาติดต่อแอดมินหรือผู้ดูแลระบบครับ</p>
                        </div>
                    `; 
                } else { 
                    // 3. 🟡 คนใหม่ที่ยังไม่ลงทะเบียน โชว์ให้ก๊อปปี้ UID
                    document.getElementById('reportForm').style.display = 'none';
                    document.getElementById('loader').innerHTML = `
                        <div style="background: white; border-radius: 15px; padding: 25px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); margin-top: 20px; border-top: 5px solid #ffc107; text-align: center;">
                            <h4 class="fw-bold text-warning mb-3">⚠️ ไม่มีสิทธิ์เข้าใช้งาน</h4>
                            <p class="text-muted mb-2">บัญชีของคุณยังไม่ได้รับการอนุมัติ<br>กรุณาคัดลอก UID ด้านล่างส่งให้แอดมินครับ</p>
                            
                            <div style="background-color: #f8f9fa; border-radius: 10px; padding: 15px; margin: 20px 0; word-break: break-all; font-family: monospace; font-size: 1.1rem; color: #13444B; border: 1px dashed #4EB1B3;">
                                ${uid}
                            </div>
                            
                            <button class="btn btn-warning text-dark w-100 fw-bold py-2" style="border-radius: 10px;" onclick="copyMyUID('${uid}')">
                                📋 คัดลอก UID ส่งให้แอดมิน
                            </button>
                        </div>
                    `; 
                }
            } catch (err) { 
                document.getElementById('loader').innerHTML = `<p class="text-danger fw-bold text-center mt-4">เชื่อมต่อเซิร์ฟเวอร์ผิดพลาด</p>`; 
            }
        }
        
        document.getElementById('reportForm').onsubmit = async (e) => {
            e.preventDefault();
            const btn = document.getElementById('btnSubmit');

            // --- ตรวจสอบเงื่อนไขสถานที่เหมา ---
            const maoValue = Number(document.getElementById('mao').value) || 0;
            const maoLoc = document.getElementById('mao_location').value.trim();
            if (maoValue > 0 && maoLoc === "") {
                alert("⚠️ กรุณาระบุ 'สถานที่เหมา' ด้วยครับ (เนื่องจากมีการกรอกยอดงานเหมา)");
                document.getElementById('mao_location').focus();
                return; // หยุดการทำงาน ไม่ให้ส่งฟอร์ม
            }

            btn.disabled = true; btn.innerText = "กำลังบันทึก...";

            const payload = {
                uid: document.getElementById('uid').value, name: document.getElementById('name').value, plate: document.getElementById('plate').value,
                type: document.getElementById('type').value, report_date: document.getElementById('report_date').value, grab: document.getElementById('grab').value,
                bolt: document.getElementById('bolt').value, maxim: document.getElementById('maxim').value, indriver: document.getElementById('indriver').value,
                lineman: document.getElementById('lineman').value, outside: document.getElementById('outside').value, mao: document.getElementById('mao').value,
                mao_location: document.getElementById('mao_location').value, airport_calc: document.getElementById('airport_calc').value
            };

            try {
                const res = await fetch(GAS_URL, { method: 'POST', body: JSON.stringify(payload) });
                const result = await res.json();
                if(result.status === "success") { alert("บันทึกยอดสำเร็จ กรุณาแนบสลิปในแชทครับ"); liff.closeWindow(); } 
                else { alert("เกิดข้อผิดพลาด: " + result.message); btn.disabled = false; btn.innerText = "ส่งยอดรายวัน"; }
            } catch (err) { alert("ส่งข้อมูลไม่สำเร็จ"); btn.disabled = false; btn.innerText = "ส่งยอดรายวัน"; }
        };
        main();
    </script>
</body>
</html>
