<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>สรุปผลงาน - TaxiEV</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <style>
        :root { --brand-dark: #13444B; --brand-light: #4EB1B3; --bg-light: #f4f7f6; }
        body { background-color: var(--bg-light); font-family: 'Kanit', sans-serif; }
        .dashboard-header { background: linear-gradient(135deg, var(--brand-dark), var(--brand-light)); color: white; padding: 30px 20px; border-bottom-left-radius: 30px; border-bottom-right-radius: 30px; text-align: center; box-shadow: 0 4px 15px rgba(0,0,0,0.1); position: relative; overflow: hidden;}
        .dashboard-header::after { content: ''; position: absolute; top: -50%; right: -20%; width: 200px; height: 200px; background: rgba(255,255,255,0.05); transform: rotate(45deg); }
        .stat-card { background: white; border-radius: 15px; padding: 20px; text-align: center; box-shadow: 0 4px 10px rgba(0,0,0,0.05); margin-bottom: 15px; position: relative; z-index: 10;}
        .text-huge { font-size: 2.8rem; font-weight: bold; margin: 10px 0; text-shadow: 2px 2px 4px rgba(0,0,0,0.2); }
        .week-row { display: flex; justify-content: space-between; padding: 12px 0; border-bottom: 1px dashed #e0e0e0; }
        .week-row:last-child { border-bottom: none; }
        .month-selector { background: rgba(255,255,255,0.2); border: 1px solid rgba(255,255,255,0.5); color: white; border-radius: 10px; padding: 8px 15px; font-weight: bold; text-align: center; margin-top: 5px;}
        .month-selector::-webkit-calendar-picker-indicator { filter: invert(1); cursor: pointer; }
        .leave-badge { font-size: 1.5rem; color: #dc3545; font-weight: bold; }
        .text-brand { color: var(--brand-light); }
    </style>
</head>
<body>
    <div class="dashboard-header mb-4">
        <h6 class="mb-1 opacity-75">รายได้สุทธิประจำเดือน</h6>
        <div class="text-huge" id="totalNet">0 ฿</div>
        <input type="month" id="monthSelector" class="month-selector" onchange="fetchSummary()">
    </div>

    <div id="loader" class="text-center py-5"><div class="spinner-border text-info"></div><p class="mt-2 text-muted">กำลังคำนวณยอด...</p></div>

    <div id="app" style="display:none; padding-bottom: 30px;">
        <div class="container">
            <div class="stat-card d-flex justify-content-between align-items-center px-4" style="margin-top: -30px;">
                <span class="text-muted fw-bold">จำนวนวันที่หยุดพักผ่อน</span>
                <span class="leave-badge"><span id="leaveDays">0</span> วัน</span>
            </div>

            <div class="stat-card mt-3 text-start">
                <h6 class="fw-bold mb-3" style="color: var(--brand-dark);">📊 สรุปรายรับสุทธิ (รายสัปดาห์)</h6>
                <div class="week-row"><span class="text-muted">สัปดาห์ที่ 1 (วันที่ 1-7)</span> <strong class="text-brand" id="w1">0 ฿</strong></div>
                <div class="week-row"><span class="text-muted">สัปดาห์ที่ 2 (วันที่ 8-14)</span> <strong class="text-brand" id="w2">0 ฿</strong></div>
                <div class="week-row"><span class="text-muted">สัปดาห์ที่ 3 (วันที่ 15-21)</span> <strong class="text-brand" id="w3">0 ฿</strong></div>
                <div class="week-row"><span class="text-muted">สัปดาห์ที่ 4 (วันที่ 22-28)</span> <strong class="text-brand" id="w4">0 ฿</strong></div>
                <div class="week-row"><span class="text-muted">ปลายเดือน (วันที่ 29 เป็นต้นไป)</span> <strong class="text-brand" id="w5">0 ฿</strong></div>
            </div>
        </div>
    </div>

    <script>
        const LIFF_ID = "2009404765-4vc029WP"; 
        const GAS_URL = "https://script.google.com/macros/s/AKfycbxG-5fGF6MFCVeL6i_mo8OL8Nz3uKn5gtEQeeJxbueIBb_Cb3r8d6Ilan9Nxz87UT9onw/exec";
        let userUid = "";


        async function checkUser(uid) {
            try {
                const res = await fetch(`${GAS_URL}?uid=${uid}`); 
                const data = await res.json();
                
                if (data.status === "success") {
                    // กรณีเป็นคนขับที่ลงทะเบียนแล้วและสถานะ Active
                    document.getElementById('driverName').innerText = data.name; 
                    if(document.getElementById('driverPlate')) document.getElementById('driverPlate').innerText = data.plate;
                    if(document.getElementById('driverType')) document.getElementById('driverType').innerText = data.type;
                    
                    if(document.getElementById('name')) document.getElementById('name').value = data.name; 
                    if(document.getElementById('plate')) document.getElementById('plate').value = data.plate; 
                    if(document.getElementById('type')) document.getElementById('type').value = data.type;
                    
                    if(data.type === "สนามบิน" && document.getElementById('airportSection')) {
                        document.getElementById('airportSection').style.display = 'block';
                    }
                    
                    document.getElementById('loader').style.display = 'none'; 
                    
                    // โชว์ฟอร์มของแต่ละหน้า (เช็คว่าหน้านั้นใช้ ID ฟอร์มชื่ออะไร)
                    if(document.getElementById('reportForm')) document.getElementById('reportForm').style.display = 'block';
                    if(document.getElementById('leaveForm')) document.getElementById('leaveForm').style.display = 'block';
                    if(document.getElementById('app')) document.getElementById('app').style.display = 'block';
                } else { 
                    // 🔴 กรณีเป็นคนขับใหม่ หรือบัญชีถูกระงับ ให้โชว์ UID พร้อมปุ่มก๊อปปี้
                    document.getElementById('loader').innerHTML = `
                        <div class="alert alert-warning mt-4 text-center" style="border-radius: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.05);">
                            <h5 class="fw-bold text-danger mb-3">⚠️ บัญชีของคุณยังไม่พร้อมใช้งาน</h5>
                            <p class="small text-muted mb-2">กรุณาคัดลอกรหัสประจำตัว (UID) ด้านล่าง<br>ส่งให้แอดมินเพื่อลงทะเบียนเข้าสู่ระบบครับ</p>
                            <div class="bg-white p-2 border rounded text-dark fw-bold mb-3" style="word-break: break-all; font-size: 0.9rem;">
                                ${uid}
                            </div>
                            <button class="btn btn-dark w-100 fw-bold" style="border-radius: 10px;" onclick="navigator.clipboard.writeText('${uid}'); alert('คัดลอก UID สำเร็จ! นำไปวางในแชทให้แอดมินได้เลยครับ');">
                                📋 คัดลอกรหัส UID
                            </button>
                        </div>
                    `; 
                }
            } catch (err) { 
                document.getElementById('loader').innerHTML = `<p class="text-danger fw-bold">เชื่อมต่อเซิร์ฟเวอร์ผิดพลาด กรุณาลองใหม่</p>`; 
            }
        }
        
        async function main() {
            await liff.init({ liffId: LIFF_ID });
            if (!liff.isLoggedIn()) { liff.login(); return; }
            userUid = (await liff.getProfile()).userId;
            const now = new Date(); const yyyy = now.getFullYear(); let mm = now.getMonth() + 1;
            if (mm < 10) mm = '0' + mm;
            document.getElementById('monthSelector').value = `${yyyy}-${mm}`;
            fetchSummary();
        }

        async function fetchSummary() {
            document.getElementById('loader').style.display = 'block'; document.getElementById('app').style.display = 'none';
            try {
                const res = await fetch(GAS_URL, { method: 'POST', body: JSON.stringify({ status: "ดูสรุป", uid: userUid, month_val: document.getElementById('monthSelector').value }) });
                const data = await res.json();
                if(data.status === "success") {
                    document.getElementById('totalNet').innerText = data.totalNet.toLocaleString() + " ฿"; document.getElementById('leaveDays').innerText = data.leaveDays;
                    document.getElementById('w1').innerText = data.weeks[0].toLocaleString() + " ฿"; document.getElementById('w2').innerText = data.weeks[1].toLocaleString() + " ฿";
                    document.getElementById('w3').innerText = data.weeks[2].toLocaleString() + " ฿"; document.getElementById('w4').innerText = data.weeks[3].toLocaleString() + " ฿";
                    document.getElementById('w5').innerText = data.weeks[4].toLocaleString() + " ฿";
                    document.getElementById('loader').style.display = 'none'; document.getElementById('app').style.display = 'block';
                }
            } catch (err) { alert("โหลดข้อมูลผิดพลาด"); }
        }
        main();
    </script>
</body>
</html>
