<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>แจ้งหยุดงาน - TaxiEV</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <style>
        :root { --brand-dark: #13444B; --brand-light: #4EB1B3; --bg-light: #f4f7f6; }
        body { background-color: var(--bg-light); font-family: 'Kanit', sans-serif; }
        .brand-header { background: linear-gradient(135deg, var(--brand-dark), var(--brand-light)); color: white; padding: 30px 20px 40px; border-bottom-left-radius: 30px; border-bottom-right-radius: 30px; text-align: center; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        .card-custom { background: white; border-radius: 15px; padding: 25px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); border: none; margin-top: -20px; position: relative; z-index: 10; }
        .form-label { font-weight: bold; color: var(--brand-dark); }
        .form-control { border-radius: 10px; background-color: #f8f9fa; }
        .form-control:focus { border-color: var(--brand-light); box-shadow: 0 0 0 0.2rem rgba(78, 177, 179, 0.25); }
        .btn-brand { background-color: #dc3545; color: white; border-radius: 10px; padding: 12px; font-weight: bold; width: 100%; border: none; }
    </style>
</head>
<body>
    <div class="brand-header">
        <h4 class="fw-bold mb-1">แจ้งหยุดงาน / ลาพัก</h4>
        <p class="mb-0 opacity-75 small">ข้อมูลจะถูกบันทึกลงปฏิทินอัตโนมัติ</p>
    </div>

    <div class="container">
        <div id="loader" class="text-center py-5 mt-4"><div class="spinner-border text-danger"></div></div>
        
        <div class="card-custom" id="leaveForm" style="display:none;">
            <div class="text-center mb-4 border-bottom pb-3">
                <h5 class="fw-bold text-dark mb-0" id="driverName">...</h5>
                <small class="text-muted" id="driverPlate">...</small>
            </div>
            <form id="form">
                <input type="hidden" id="uid"><input type="hidden" id="name"><input type="hidden" id="plate"><input type="hidden" id="type">
                
                <div class="mb-3 border-bottom pb-3">
                    <label class="form-label d-block text-dark">รูปแบบการหยุด</label>
                    <div class="form-check form-check-inline">
                        <input class="form-check-input" type="radio" name="leaveType" id="leaveOne" value="1" checked onchange="toggleLeaveType()">
                        <label class="form-check-label text-muted" for="leaveOne">หยุด 1 วัน</label>
                    </div>
                    <div class="form-check form-check-inline">
                        <input class="form-check-input" type="radio" name="leaveType" id="leaveMultiple" value="M" onchange="toggleLeaveType()">
                        <label class="form-check-label text-muted" for="leaveMultiple">หยุดหลายวัน</label>
                    </div>
                </div>

                <div class="mb-3">
                    <label class="form-label" id="startDateLabel">วันที่หยุด</label>
                    <input type="date" id="start_date" class="form-control" required>
                </div>

                <div class="mb-3" id="endDateGroup" style="display: none;">
                    <label class="form-label">ถึงวันที่</label>
                    <input type="date" id="end_date" class="form-control">
                </div>

                <div class="mb-4 mt-2">
                    <label class="form-label">เหตุผลการหยุด</label>
                    <input type="text" id="leave_reason" class="form-control" placeholder="เช่น ธุระส่วนตัว, รถซ่อม" required>
                </div>
                <button type="submit" id="btnSubmit" class="btn btn-brand shadow-sm">บันทึกวันหยุด</button>
            </form>
        </div>
    </div>

    <script>
        const LIFF_ID = "2009404765-GgNvDh2o"; 
        const GAS_URL = "https://script.google.com/macros/s/AKfycbxG-5fGF6MFCVeL6i_mo8OL8Nz3uKn5gtEQeeJxbueIBb_Cb3r8d6Ilan9Nxz87UT9onw/exec";
        
        async function main() {
            await liff.init({ liffId: LIFF_ID });
            if (!liff.isLoggedIn()) { liff.login(); return; }
            const profile = await liff.getProfile();
            document.getElementById('uid').value = profile.userId;
            
            const now = new Date(); const yyyy = now.getFullYear(); const mm = String(now.getMonth() + 1).padStart(2, '0'); const dd = String(now.getDate()).padStart(2, '0');
            const today = `${yyyy}-${mm}-${dd}`;
            document.getElementById('start_date').value = today; document.getElementById('end_date').value = today;
            checkUser(profile.userId);
        }

        // ฟังก์ชันสลับโชว์ซ่อนช่องวันที่
        function toggleLeaveType() {
            const isMultiple = document.getElementById('leaveMultiple').checked;
            document.getElementById('endDateGroup').style.display = isMultiple ? 'block' : 'none';
            document.getElementById('startDateLabel').innerText = isMultiple ? 'เริ่มหยุดวันที่' : 'วันที่หยุด';
            if(!isMultiple) {
                document.getElementById('end_date').removeAttribute('required');
            } else {
                document.getElementById('end_date').setAttribute('required', 'true');
            }
        }

        async function checkUser(uid) {
            try {
                const res = await fetch(`${GAS_URL}?uid=${uid}`); const data = await res.json();
                if (data.status === "success") {
                    document.getElementById('driverName').innerText = data.name; document.getElementById('driverPlate').innerText = data.plate;
                    document.getElementById('name').value = data.name; document.getElementById('plate').value = data.plate; document.getElementById('type').value = data.type;
                    document.getElementById('loader').style.display = 'none'; document.getElementById('leaveForm').style.display = 'block';
                }
            } catch (err) { alert("ดึงข้อมูลล้มเหลว"); }
        }

        document.getElementById('form').onsubmit = async (e) => {
            e.preventDefault();
            const btn = document.getElementById('btnSubmit');
            btn.disabled = true; btn.innerText = "กำลังบันทึก...";

            const isMultiple = document.getElementById('leaveMultiple').checked;
            const startDate = document.getElementById('start_date').value;
            // ถ้าเลือก 1 วัน ให้จับยัด startDate ลงใน endDate ด้วยเลย เพื่อให้หลังบ้านทำงานถูก
            const endDate = isMultiple ? document.getElementById('end_date').value : startDate;

            const payload = {
                status: "หยุดงาน", uid: document.getElementById('uid').value, name: document.getElementById('name').value,
                plate: document.getElementById('plate').value, type: document.getElementById('type').value,
                start_date: startDate, end_date: endDate, leave_reason: document.getElementById('leave_reason').value
            };

            try {
                const res = await fetch(GAS_URL, { method: 'POST', body: JSON.stringify(payload) });
                const result = await res.json();
                if(result.status === "success") { alert("บันทึกวันหยุดสำเร็จ"); liff.closeWindow(); }
            } catch (err) { alert("ขัดข้อง ลองใหม่ครับ"); }
            btn.disabled = false; btn.innerText = "บันทึกวันหยุด";
        };
        main();
    </script>
</body>
</html>
