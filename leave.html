<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>แจ้งหยุดงาน - TaxiEV</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <style>
        body { background-color: #fce8e6; font-family: 'Kanit', sans-serif; }
        .card { border-radius: 15px; border: none; box-shadow: 0 4px 15px rgba(220, 53, 69, 0.15); }
        .btn-danger { font-weight: bold; border-radius: 10px; padding: 12px; }
        .form-label { font-size: 0.9rem; font-weight: bold; color: #555; }
        .radio-group { background: #fff; padding: 10px; border-radius: 10px; border: 1px solid #dee2e6; mb-3;}
    </style>
</head>
<body class="p-3">
    <div id="loader" class="text-center py-5"><div class="spinner-border text-danger"></div><p class="mt-2 text-muted">กำลังโหลดข้อมูล...</p></div>

    <div id="app" class="card p-4" style="display:none;">
        <h4 class="text-danger fw-bold text-center mb-3">📅 แจ้งหยุดงาน</h4>
        <div class="alert alert-light border text-center p-2 mb-3">
            <span id="driverName" class="fw-bold fs-5 text-dark">---</span><br>
            <span id="driverPlate" class="badge bg-secondary">---</span>
        </div>

        <form id="leaveForm">
            <div class="radio-group mb-3">
                <div class="form-check form-check-inline">
                    <input class="form-check-input" type="radio" name="leaveType" id="typeSingle" value="single" checked onchange="toggleDateInputs()">
                    <label class="form-check-label text-danger fw-bold" for="typeSingle">หยุด 1 วัน</label>
                </div>
                <div class="form-check form-check-inline">
                    <input class="form-check-input" type="radio" name="leaveType" id="typeMultiple" value="multiple" onchange="toggleDateInputs()">
                    <label class="form-check-label text-danger fw-bold" for="typeMultiple">หยุดหลายวัน</label>
                </div>
            </div>

            <div id="singleDateSection" class="mb-3">
                <label class="form-label">วันที่หยุด</label>
                <input type="date" id="singleDate" class="form-control">
            </div>

            <div id="multipleDateSection" class="row mb-3" style="display:none;">
                <div class="col-6">
                    <label class="form-label">เริ่มหยุดวันที่</label>
                    <input type="date" id="startDate" class="form-control">
                </div>
                <div class="col-6">
                    <label class="form-label">ถึงวันที่</label>
                    <input type="date" id="endDate" class="form-control">
                </div>
            </div>

            <div class="mb-4">
                <label class="form-label">เหตุผลการหยุด</label>
                <textarea id="reason" class="form-control" rows="2" placeholder="เช่น ธุระส่วนตัว, พักผ่อน, ป่วย"></textarea>
            </div>
            
            <button type="submit" id="btnSubmit" class="btn btn-danger w-100">ยืนยันการแจ้งหยุด</button>
        </form>
    </div>

    <script>
        const LIFF_ID = "2009404765-GgNvDh2o"; 
        const GAS_URL = "https://script.google.com/macros/s/AKfycbw6ToiCFNw5G_nICYPiIuYmEeRoeFloA-MTQt73TbQ0ImfVHv3UOLt9ldjG5lDiqY9TGg/exec";
        let driverData = {};

        // ฟังก์ชันสลับหน้าจอเลือกวันที่
        function toggleDateInputs() {
            const isSingle = document.getElementById('typeSingle').checked;
            document.getElementById('singleDateSection').style.display = isSingle ? 'block' : 'none';
            document.getElementById('multipleDateSection').style.display = isSingle ? 'none' : 'flex';
        }

        async function main() {
            try {
                await liff.init({ liffId: LIFF_ID });
                if (!liff.isLoggedIn()) { liff.login(); return; }
                
                const profile = await liff.getProfile();
                const res = await fetch(`${GAS_URL}?uid=${profile.userId}`);
                driverData = await res.json();

                if(driverData.status === "success") {
                    document.getElementById('driverName').innerText = driverData.name;
                    document.getElementById('driverPlate').innerText = driverData.plate;
                    
                    // ตั้งค่าเริ่มต้นเป็นวันนี้
                    const today = new Date().toISOString().split('T')[0];
                    document.getElementById('singleDate').value = today;
                    document.getElementById('startDate').value = today;
                    document.getElementById('endDate').value = today;

                    document.getElementById('loader').style.display = 'none';
                    document.getElementById('app').style.display = 'block';
                } else {
                    alert("ไม่พบข้อมูลผู้ใช้งาน กรุณาติดต่อแอดมิน");
                    liff.closeWindow();
                }
            } catch (err) {
                alert("เกิดข้อผิดพลาดในการเชื่อมต่อ");
            }
        }

        document.getElementById('leaveForm').onsubmit = async (e) => {
            e.preventDefault();
            const btn = document.getElementById('btnSubmit');
            const isSingle = document.getElementById('typeSingle').checked;
            
            // กำหนดวันที่เริ่มและสิ้นสุดตามตัวเลือก
            const start = isSingle ? document.getElementById('singleDate').value : document.getElementById('startDate').value;
            const end = isSingle ? document.getElementById('singleDate').value : document.getElementById('endDate').value;
            
            if(!start || !end) { alert("กรุณาระบุวันที่"); return; }
            if(new Date(start) > new Date(end)) { alert("วันที่เริ่มต้นต้องไม่เกินวันที่สิ้นสุด"); return; }

            btn.disabled = true;
            btn.innerText = "กำลังบันทึกข้อมูล...";

            const payload = {
                status: "หยุดงาน",
                uid: (await liff.getProfile()).userId,
                name: driverData.name,
                plate: driverData.plate,
                type: driverData.type,
                start_date: start,
                end_date: end,
                leave_reason: document.getElementById('reason').value || "ไม่ได้ระบุเหตุผล"
            };

            try {
                await fetch(GAS_URL, { method: 'POST', body: JSON.stringify(payload) });
                alert("บันทึกวันหยุดลงระบบเรียบร้อยแล้ว!");
                liff.closeWindow();
            } catch(err) {
                alert("เชื่อมต่อขัดข้อง แต่ข้อมูลอาจเข้าระบบแล้ว กรุณาตรวจสอบใน LINE");
                liff.closeWindow();
            }
        }
        main();
    </script>
</body>
</html>
