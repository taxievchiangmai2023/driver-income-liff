<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>แจ้งหยุดงาน - TaxiEV</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <style>
        body { background-color: #f8d7da; font-family: sans-serif; }
        .main-card { border: none; border-radius: 20px; box-shadow: 0 8px 24px rgba(0,0,0,0.1); background: white; }
        .btn-submit { background-color: #dc3545; color: white; border: none; padding: 15px; border-radius: 12px; font-weight: 700; width: 100%; }
        .calendar-link { background-color: #e9ecef; color: #495057; text-decoration: none; display: block; padding: 10px; border-radius: 10px; text-align: center; margin-top: 15px; font-size: 14px; }
    </style>
</head>
<body>

    <div id="loader" class="text-center mt-5">
        <div class="spinner-border text-danger"></div>
        <p class="mt-2">กำลังโหลดข้อมูลผู้ใช้...</p>
    </div>

    <div id="app-content" class="container py-4" style="display: none;">
        <div class="main-card p-4">
            <h5 class="text-danger">📅 แจ้งหยุดงาน / ลาพัก</h5>
            <p class="text-muted small">คุณ: <span id="u_name"></span> (<span id="u_plate"></span>)</p>
            <hr>
            <form id="leaveForm">
                <div class="row g-2 mb-3">
                    <div class="col-6">
                        <label class="form-label small font-weight-bold">เริ่มหยุดวันที่</label>
                        <input type="date" id="start_date" class="form-control" required>
                    </div>
                    <div class="col-6">
                        <label class="form-label small font-weight-bold">ถึงวันที่</label>
                        <input type="date" id="end_date" class="form-control" required>
                    </div>
                </div>

                <label class="form-label small font-weight-bold">📝 เหตุผลการหยุด (ถ้ามี)</label>
                <input type="text" id="leave_reason" class="form-control mb-4" placeholder="เช่น ธุระส่วนตัว, ซ่อมรถ">

                <button type="submit" id="btnSubmit" class="btn btn-submit">ยืนยันการแจ้งหยุดงาน</button>
            </form>

            <a href="URL_GOOGLE_CALENDAR_YOURS" target="_blank" class="calendar-link">
                🔎 ดูวันหยุดเพื่อนร่วมงานในปฏิทิน
            </a>
        </div>
    </div>

    <script>
        const LIFF_ID = "2009435915-pIEfPNBg"; 
        const GAS_URL = "https://script.google.com/macros/s/AKfycbwwLvT69pgb0K-uSADdHfFCV23mCZbgRmXrRJa3h2tIIGTnFQucKOROdegD_empt0yxvg/exec";
        let driver = {};

        async function main() {
            try {
                await liff.init({ liffId: LIFF_ID });
                if (!liff.isLoggedIn()) { liff.login(); return; }
                const profile = await liff.getProfile();
                const response = await fetch(`${GAS_URL}?uid=${profile.userId}`);
                driver = await response.json();

                document.getElementById('loader').style.display = 'none';
                if (driver.status === "success") {
                    document.getElementById('u_name').innerText = driver.name;
                    document.getElementById('u_plate').innerText = driver.plate;
                    document.getElementById('app-content').style.display = 'block';
                    document.getElementById('start_date').valueAsDate = new Date();
                    document.getElementById('end_date').valueAsDate = new Date();
                } else {
                    alert("❌ ไม่พบข้อมูลลงทะเบียน"); liff.closeWindow();
                }
            } catch (err) { alert("เชื่อมต่อผิดพลาด"); }
        }

        document.getElementById('leaveForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('btnSubmit');
            const start = document.getElementById('start_date').value;
            const end = document.getElementById('end_date').value;

            if (new Date(end) < new Date(start)) {
                alert("วันที่สิ้นสุดต้องไม่น้อยกว่าวันที่เริ่ม"); return;
            }

            btn.disabled = true; btn.innerText = "กำลังบันทึก...";

            const payload = {
                uid: (await liff.getProfile()).userId,
                name: driver.name, plate: driver.plate, type: driver.type,
                status: "หยุดงาน",
                start_date: start,
                end_date: end,
                leave_reason: document.getElementById('leave_reason').value || "ไม่ได้ระบุเหตุผล"
            };

            const res = await fetch(GAS_URL, { method: 'POST', body: JSON.stringify(payload) });
            const result = await res.json();
            if (result.status === "success") {
                alert("บันทึกวันหยุดลงระบบและปฏิทินเรียบร้อย!");
                liff.closeWindow();
            } else { alert("Error: " + result.message); btn.disabled = false; }
        });
        main();
    </script>
</body>
</html>
