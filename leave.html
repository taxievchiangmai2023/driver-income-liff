<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>แจ้งหยุดงาน - TaxiEV</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <style>
        body { background-color: #fce8e6; font-family: 'Kanit', sans-serif; }
        .card { border-radius: 20px; border: none; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        .btn-danger { border-radius: 12px; padding: 12px; font-weight: bold; background-color: #d9534f; }
    </style>
</head>
<body class="p-3">
    <div id="loader" class="text-center py-5"><div class="spinner-border text-danger"></div></div>

    <div id="app" class="card p-4" style="display:none;">
        <h4 class="text-danger mb-3">📅 แจ้งหยุดงาน</h4>
        <p class="text-muted small">ระบุวันที่คุณต้องการหยุดงาน ระบบจะลงปฏิทินและบันทึกยอดเป็น 0 ให้อัตโนมัติ</p>
        <hr>
        <div class="mb-3">
            <label class="form-label fw-bold">ชื่อ-นามสกุล:</label>
            <input type="text" id="driverName" class="form-control bg-light" readonly>
        </div>
        <div class="row mb-3">
            <div class="col-6">
                <label class="form-label fw-bold small">เริ่มหยุดวันที่</label>
                <input type="date" id="startDate" class="form-control">
            </div>
            <div class="col-6">
                <label class="form-label fw-bold small">ถึงวันที่</label>
                <input type="date" id="endDate" class="form-control">
            </div>
        </div>
        <div class="mb-4">
            <label class="form-label fw-bold">เหตุผลการหยุด</label>
            <textarea id="reason" class="form-control" rows="2" placeholder="เช่น ธุระส่วนตัว, ซ่อมรถ, พักผ่อน"></textarea>
        </div>
        <button onclick="submitLeave()" id="btnSubmit" class="btn btn-danger w-100">ยืนยันการแจ้งหยุด</button>
    </div>

    <script>
        const LIFF_ID = "2009435915-pIEfPNBg"; 
        const GAS_URL = "https://script.google.com/macros/s/AKfycbxYPUYkJdZNBvhP7ULIe7b3NVWPmu3dgrkfR6RSmai4u4Ou3VUqnzfjzxqME9ifMrByww/exec";

        async function main() {
            await liff.init({ liffId: LIFF_ID });
            if (!liff.isLoggedIn()) { liff.login(); return; }
            
            const profile = await liff.getProfile();
            const res = await fetch(`${GAS_URL}?uid=${profile.userId}`);
            const data = await res.json();

            if(data.status === "success") {
                document.getElementById('driverName').value = data.name;
                document.getElementById('app').style.display = 'block';
                document.getElementById('loader').style.display = 'none';
                // ตั้งค่าเริ่มต้นเป็นวันที่ปัจจุบัน
                document.getElementById('startDate').valueAsDate = new Date();
                document.getElementById('endDate').valueAsDate = new Date();
            } else {
                alert("ไม่พบข้อมูลผู้ใช้งาน กรุณาติดต่อแอดมิน");
                liff.closeWindow();
            }
        }

        async function submitLeave() {
            const btn = document.getElementById('btnSubmit');
            const start = document.getElementById('startDate').value;
            const end = document.getElementById('endDate').value;
            
            if(!start || !end) { alert("กรุณาระบุวันที่"); return; }
            if(new Date(start) > new Date(end)) { alert("วันที่เริ่มต้นต้องไม่เกินวันที่สิ้นสุด"); return; }

            btn.disabled = true;
            btn.innerText = "กำลังบันทึก...";

            const profile = await liff.getProfile();
            const payload = {
                status: "หยุดงาน",
                uid: profile.userId,
                name: document.getElementById('driverName').value,
                start_date: start,
                end_date: end,
                leave_reason: document.getElementById('reason').value || "ไม่ได้ระบุเหตุผล"
            };

            fetch(GAS_URL, { method: 'POST', body: JSON.stringify(payload) })
            .then(() => {
                alert("บันทึกวันหยุดเรียบร้อยแล้ว!");
                liff.closeWindow();
            }).catch(() => {
                alert("เกิดข้อผิดพลาด กรุณาลองใหม่");
                btn.disabled = false;
            });
        }
        main();
    </script>
</body>
</html>
