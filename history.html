<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ประวัติและแก้ไข - TaxiEV</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script> 
    <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <style>
        :root { --brand-dark: #13444B; --brand-light: #4EB1B3; --bg-light: #f4f7f6; }
        body { background-color: var(--bg-light); font-family: 'Kanit', sans-serif; padding-bottom: 30px;}
        .brand-header { background: linear-gradient(135deg, var(--brand-dark), var(--brand-light)); color: white; padding: 25px 20px 35px; border-bottom-left-radius: 30px; border-bottom-right-radius: 30px; text-align: center; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        .card-custom { background: white; border-radius: 15px; padding: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); border: none; margin-bottom: 12px; }
        .btn-edit { background-color: #ffc107; color: #000; font-weight: bold; border-radius: 8px; font-size: 0.85rem; border: none;}
        .btn-slip { background-color: #17a2b8; color: white; font-weight: bold; border-radius: 8px; font-size: 0.85rem; border: none;}
        .btn-brand { background-color: var(--brand-dark); color: white; font-weight: bold; border-radius: 10px; padding: 12px; width: 100%; border:none;}
        .history-date { font-size: 1.05rem; font-weight: bold; color: var(--brand-dark); }
        .badge-edit { font-size: 0.7rem; background-color: #dc3545; color: white; padding: 3px 6px; border-radius: 5px;}
        
        #editSection, #slipSection { display: none; background: var(--bg-light); padding: 15px; position: absolute; top: 0; left: 0; right: 0; min-height: 100vh; z-index: 1000;}
        .form-section { background: white; border-radius: 15px; padding: 15px; margin-bottom: 15px; box-shadow: 0 2px 8px rgba(0,0,0,0.05); border-left: 4px solid var(--brand-light);}
        .form-label { font-weight: bold; font-size: 0.85rem; color: var(--brand-dark); margin-bottom: 5px; }
        .form-control { border-radius: 10px; background-color: #f8f9fa; border: 1px solid #dee2e6; }
        .form-control:focus { border-color: var(--brand-light); box-shadow: 0 0 0 0.2rem rgba(78, 177, 179, 0.25); }
    </style>
</head>
<body>
    <div id="historyList">
        <div class="brand-header mb-4">
            <h4 class="fw-bold mb-0">ประวัติการส่งยอด</h4>
            <p class="mb-0 opacity-75 small">ดูย้อนหลังล่าสุด</p>
        </div>
        <div class="container">
            <div id="loader" class="text-center py-5"><div class="spinner-border text-info"></div></div>
            <div id="cardsContainer"></div>
        </div>
    </div>

    <div id="editSection">
        <div class="d-flex justify-content-between align-items-center mb-3">
            <h5 class="fw-bold mb-0" style="color: var(--brand-dark);">✏️ แก้ไขยอด</h5>
            <button class="btn btn-outline-danger btn-sm" onclick="closeForms()">ยกเลิก</button>
        </div>
        
        <div class="alert alert-warning text-center py-2 mb-3" style="background-color: white; border-color: #ffc107; color: var(--brand-dark);">
            <strong>วันที่: <span id="editDateDisplay"></span></strong>
        </div>

        <form id="editForm">
            <input type="hidden" id="editRow">
            <input type="hidden" id="editTimestamp">

            <div class="form-section">
                <h6 class="fw-bold mb-3" style="color: var(--brand-light);">📱 รายได้จากแอปพลิเคชัน</h6>
                <div class="row g-2">
                    <div class="col-6"><label class="form-label">Grab</label><input type="number" id="e_grab" class="form-control" placeholder="0" step="any"></div>
                    <div class="col-6"><label class="form-label">Bolt</label><input type="number" id="e_bolt" class="form-control" placeholder="0" step="any"></div>
                    <div class="col-6"><label class="form-label">Maxim</label><input type="number" id="e_maxim" class="form-control" placeholder="0" step="any"></div>
                    <div class="col-6"><label class="form-label">InDriver</label><input type="number" id="e_indriver" class="form-control" placeholder="0" step="any"></div>
                    <div class="col-12"><label class="form-label">LINE MAN</label><input type="number" id="e_lineman" class="form-control" placeholder="0" step="any"></div>
                </div>
            </div>

            <div class="form-section" style="border-left-color: #ffc107;">
                <h6 class="text-warning fw-bold mb-3">🚕 งานนอกระบบ / เหมา</h6>
                <div class="row g-2">
                    <div class="col-6"><label class="form-label">งานนอก</label><input type="number" id="e_outside" class="form-control" placeholder="0" step="any"></div>
                    <div class="col-6"><label class="form-label">งานเหมา</label><input type="number" id="e_mao" class="form-control" placeholder="0" step="any"></div>
                    <div class="col-12"><label class="form-label">สถานที่เหมา (ถ้ามี)</label><input type="text" id="e_mao_location" class="form-control" placeholder="เช่น เชียงใหม่-ปาย"></div>
                </div>
            </div>

            <div class="form-section" id="airportSection" style="border-left-color: #198754; display: none;">
                <h6 class="text-success fw-bold mb-3">✈️ งานสนามบิน</h6>
                <label class="form-label">ยอดหักเข้าสนามบิน (ใส่สูตรได้)</label>
                <input type="text" id="e_airport" class="form-control" placeholder="เช่น 150+150">
            </div>
            
            <button type="submit" id="btnSubmitEdit" class="btn btn-brand mt-2 shadow-sm">บันทึกยอดใหม่</button>
        </form>
    </div>

    <div id="slipSection">
        <div class="d-flex justify-content-between align-items-center mb-3">
            <h5 class="fw-bold mb-0" style="color: var(--brand-dark);">📸 ส่งสลิปโอนเงิน</h5>
            <button class="btn btn-outline-danger btn-sm" onclick="closeForms()">ยกเลิก</button>
        </div>
        
        <div class="alert alert-info text-center py-2 mb-3" style="background-color: white; border-color: #17a2b8; color: var(--brand-dark);">
            <strong>ยอดของวันที่: <span id="slipDateDisplay"></span></strong>
        </div>

        <form id="slipForm">
            <input type="hidden" id="slipRow">
            <input type="hidden" id="slipTimestamp">

            <div class="form-section" style="border-left-color: #6610f2;">
                <label class="form-label fw-bold" style="color: #6610f2;">🏦 โอนเข้าบัญชีธนาคาร:</label>
                <select id="slip_account" class="form-control mb-2">
                    <option value="ACCOUNT_A">บัญชีหลัก (หจก. โอเค...)</option>
                    <option value="ACCOUNT_B">บัญชีค่ายาง (นาย เด่นภูมิ )</option>
                </select>
            </div>

            <div class="form-section" style="border-left-color: #17a2b8;">
                <label for="slip_image" class="form-label text-info fw-bold mb-2">อัปโหลดรูปภาพสลิป</label>
                <input type="file" class="form-control" id="slip_image" accept="image/*" required>
                <small class="text-muted mt-2 d-block">ระบบจะส่งรูปภาพนี้ให้แอดมินเพื่อยืนยันการโอนเงินของวันดังกล่าว</small>
            </div>
            
            <button type="submit" id="btnSubmitSlip" class="btn btn-brand mt-2 shadow-sm" style="background-color: #17a2b8;">ส่งสลิปยืนยัน</button>
        </form>
    </div>

    <div class="modal fade" id="statusModal" tabindex="-1" aria-hidden="true" data-bs-backdrop="static">
        <div class="modal-dialog modal-dialog-centered modal-sm">
            <div class="modal-content text-center" style="border-radius: 20px; border:none;">
                <div class="modal-body p-4" id="modalBody">
                </div>
            </div>
        </div>
    </div>

    <script>
        // ⚠️ ใส่ LIFF ID และ GAS URL ของคุณ
        const LIFF_ID = "2009404765-nezOU6Ri"; 
        const GAS_URL = "https://script.google.com/macros/s/AKfycbxG-5fGF6MFCVeL6i_mo8OL8Nz3uKn5gtEQeeJxbueIBb_Cb3r8d6Ilan9Nxz87UT9onw/exec";
        let uid = ""; let currentHistoryData = []; 
        let statusModal;

        async function main() {
            statusModal = new bootstrap.Modal(document.getElementById('statusModal'));
            await liff.init({ liffId: LIFF_ID });
            if (!liff.isLoggedIn()) { liff.login(); return; }
            uid = (await liff.getProfile()).userId;
            checkUser(uid);
        }

        function showStatus(type, message) {
            const modalBody = document.getElementById('modalBody');
            let icon = "", color = "";
            
            if (type === "success") { icon = '<h1 style="font-size: 3.5rem; color: #198754; margin-bottom: 0;">✅</h1>'; color = "text-success"; }
            else if (type === "warning") { icon = '<h1 style="font-size: 3.5rem; color: #ffc107; margin-bottom: 0;">⚠️</h1>'; color = "text-warning"; }
            else if (type === "error") { icon = '<h1 style="font-size: 3.5rem; color: #dc3545; margin-bottom: 0;">❌</h1>'; color = "text-danger"; }
            else if (type === "loading") { icon = '<div class="spinner-border text-info my-3" role="status" style="width: 3rem; height: 3rem;"></div>'; color = "text-dark"; }

            let content = `${icon}<h5 class="fw-bold mt-3 ${color}">${message}</h5>`;
            if (type !== "loading") {
                content += `<button type="button" class="btn btn-outline-secondary btn-sm mt-3 px-4" data-bs-dismiss="modal">ตกลง</button>`;
            }
            modalBody.innerHTML = content;
            statusModal.show();
        }

        async function checkUser(userId) {
            try {
                const res = await fetch(`${GAS_URL}?uid=${userId}`);
                const data = await res.json();
                
                if (data.status === "success") {
                    fetchHistory();
                } else if (data.status === "suspended") {
                    document.getElementById('editSection').style.display = 'none';
                    document.getElementById('slipSection').style.display = 'none';
                    document.getElementById('historyList').innerHTML = `<div class="container pb-5"><div style="background: white; border-radius: 15px; padding: 25px; text-align: center;"><h4 class="fw-bold text-danger">🚫 บัญชีถูกระงับ</h4></div></div>`;
                } else {
                    document.getElementById('historyList').innerHTML = `<div class="container pb-5"><div style="background: white; border-radius: 15px; padding: 25px; text-align: center;"><h4 class="fw-bold text-warning">⚠️ ไม่มีสิทธิ์เข้าใช้งาน</h4></div></div>`;
                }
            } catch(err) {
                showStatus("error", "เชื่อมต่อระบบขัดข้อง");
            }
        }

        async function fetchHistory() {
            try {
                const res = await fetch(GAS_URL, { method: 'POST', body: JSON.stringify({ status: "ดูประวัติ", uid: uid }) });
                const data = await res.json();
                if(data.status === "success" && data.history.length > 0) {
                    currentHistoryData = data.history; renderHistory(currentHistoryData);
                } else { document.getElementById('cardsContainer').innerHTML = "<p class='text-center text-muted mt-5'>ยังไม่มีประวัติการส่งยอดครับ</p>"; }
                document.getElementById('loader').style.display = 'none';
            } catch(err) { showStatus("error", "โหลดประวัติไม่สำเร็จ"); }
        }

        // --- 🌟 อัปเดต: ระบบกรองซ่อนสลิป และโชว์ยอดแจ้งเตือนครบทุกกรณี ---
        function renderHistory(historyArray) {
            const container = document.getElementById('cardsContainer');
            container.innerHTML = "";
            let visibleCount = 0; 

            historyArray.forEach((item, index) => {
                const slipStatusStr = item.slipStatus || "";

                // 🛑 ถ้ายอดนี้ "ตรวจสอบแล้ว ✅" ให้ ข้ามไปเลย (ซ่อน)
                if (slipStatusStr.includes("ตรวจสอบแล้ว ✅")) {
                    return; 
                }

                visibleCount++; 

                const editBadge = item.editCount > 0 ? `<div class="mt-1"><span class="badge bg-danger shadow-sm" style="font-size: 0.75rem; padding: 4px 8px; border-radius: 6px;">✏️ แก้ไขครั้งที่ ${item.editCount}</span></div>` : "";
                const dateObj = new Date(item.date);
                const dateStr = dateObj.toLocaleDateString('th-TH', { day: 'numeric', month: 'short', year: 'numeric' });
                const totalAmount = item.totalRev ? Number(item.totalRev).toLocaleString() : '0';
                const transferAmount = item.rentalFee ? Number(item.rentalFee).toLocaleString() : '0';

                // 🌟🌟🌟 เพิ่มการเช็คสถานะสลิปทุกกรณี 🌟🌟🌟
                let warningHtml = "";
                if (slipStatusStr.includes("โอนขาด ❌")) {
                    let extractMsg = slipStatusStr.split('(')[1] ? '(' + slipStatusStr.split('(')[1] : slipStatusStr;
                    warningHtml = `<div class="alert alert-danger py-1 px-2 mt-2 mb-0 text-center" style="font-size: 0.8rem; border-radius: 8px;">⚠️ <strong>ยอดเงินไม่ครบ!</strong> รบกวนโอนเพิ่มอีก<br>${extractMsg}</div>`;
                } else if (slipStatusStr.includes("ผิดบัญชี ❌")) {
                    let extractMsg = slipStatusStr.split('(')[1] ? '(' + slipStatusStr.split('(')[1] : slipStatusStr;
                    warningHtml = `<div class="alert alert-danger py-1 px-2 mt-2 mb-0 text-center" style="font-size: 0.8rem; border-radius: 8px;">⚠️ <strong>โอนผิดบัญชี!</strong><br>${extractMsg}</div>`;
                } else if (slipStatusStr.includes("สลิปซ้ำ ❌")) {
                    warningHtml = `<div class="alert alert-danger py-1 px-2 mt-2 mb-0 text-center" style="font-size: 0.8rem; border-radius: 8px;">⚠️ <strong>สลิปซ้ำ!</strong> (รูปนี้ถูกใช้งานไปแล้ว)</div>`;
                } else if (slipStatusStr.includes("ตรวจสอบด้วยตา ⚠️")) {
                    warningHtml = `<div class="alert alert-warning py-1 px-2 mt-2 mb-0 text-center" style="font-size: 0.8rem; border-radius: 8px;">⏳ <strong>สแกนไม่ติด</strong> รอแอดมินตรวจสอบครับ</div>`;
                }

                const card = `
                    <div class="card-custom">
                        <div class="d-flex justify-content-between align-items-start mb-2 border-bottom pb-2">
                            <div>
                                <span class="history-date d-block" style="line-height: 1.2;">${dateStr}</span>
                                ${editBadge}
                            </div>
                            <div class="d-flex flex-wrap justify-content-end gap-2" style="max-width: 55%;">
                                <button class="btn btn-sm btn-info text-white shadow-sm px-2 py-1" style="border-radius: 8px; font-size: 0.8rem;" onclick="openSlipForm(${index}, '${dateStr}')">📸 แนบสลิป</button>
                                <button class="btn btn-sm btn-warning shadow-sm px-3 py-1" style="border-radius: 8px; font-size: 0.8rem;" onclick="openEditForm(${index}, '${dateStr}')">แก้ไข</button>
                            </div>
                        </div>
                        <div class="row text-center mt-2">
                            <div class="col-6 border-end">
                                <small class="text-muted d-block mb-1">ยอดรวมทั้งหมด</small>
                                <strong class="fs-5 text-dark">${totalAmount} ฿</strong>
                            </div>
                            <div class="col-6">
                                <small class="text-muted d-block mb-1">ยอดโอนบริษัท</small>
                                <strong class="fs-5" style="color: var(--brand-light);">${transferAmount} ฿</strong>
                            </div>
                        </div>
                        ${warningHtml} 
                    </div>`;
                container.innerHTML += card;
            });

            if (visibleCount === 0) {
                container.innerHTML = `
                <div class="text-center mt-5">
                    <h1 style="font-size: 4rem;">🎉</h1>
                    <h5 class="fw-bold text-success mt-3">เยี่ยมมาก!</h5>
                    <p class="text-muted">คุณไม่มีค้างส่งสลิปย้อนหลังแล้วครับ</p>
                </div>`;
            }
        }

        document.getElementById('slipForm').onsubmit = async (e) => {
            e.preventDefault();
            const btn = document.getElementById('btnSubmitSlip');
            const fileInput = document.getElementById('slip_image');
            
            if (!fileInput.files || fileInput.files.length === 0) {
                showStatus("warning", "กรุณาเลือกรูปภาพสลิปก่อนครับ");
                return;
            }

            btn.disabled = true; 
            showStatus("loading", "กำลังอัปโหลดรูปภาพ...<br><small>อาจใช้เวลาสักครู่</small>");
            
            try {
                const file = fileInput.files[0];
                const base64 = await getBase64(file); 
                
                const payload = {
                    status: "อัปโหลดสลิป", 
                    uid: uid, 
                    row: document.getElementById('slipRow').value, 
                    original_timestamp: document.getElementById('slipTimestamp').value,
                    account_type: document.getElementById('slip_account').value, 
                    slip_base64: base64,
                    slip_name: file.name
                };

                const res = await fetch(GAS_URL, { method: 'POST', body: JSON.stringify(payload) });
                const result = await res.json();
                
                statusModal.hide();
                if (result.status === "success") { 
                    showStatus("success", "ส่งสลิปสำเร็จ!<br><small class='text-muted'>แอดมินได้รับข้อมูลแล้วครับ</small>"); 
                    closeForms(); 
                    document.getElementById('loader').style.display = 'block'; 
                    document.getElementById('cardsContainer').innerHTML = ""; 
                    fetchHistory(); 
                } else { 
                    showStatus("error", "เกิดข้อผิดพลาด:<br><small>" + result.message + "</small>"); 
                }
            } catch (err) { 
                statusModal.hide();
                showStatus("error", "อัปโหลดไม่สำเร็จ<br><small class='text-muted'>ไฟล์อาจมีขนาดใหญ่เกินไป หรืออินเทอร์เน็ตขัดข้อง</small>"); 
            }
            btn.disabled = false;
        };

        function closeForms() { 
            document.getElementById('editSection').style.display = 'none'; 
            document.getElementById('slipSection').style.display = 'none'; 
            document.getElementById('historyList').style.display = 'block'; 
        }

        function openEditForm(index, dateStr) {
            const item = currentHistoryData[index]; 
            document.getElementById('editRow').value = item.row; document.getElementById('editTimestamp').value = item.timestamp;
            document.getElementById('editDateDisplay').innerText = dateStr;
            document.getElementById('e_grab').value = item.grab || ""; document.getElementById('e_bolt').value = item.bolt || "";
            document.getElementById('e_maxim').value = item.maxim || ""; document.getElementById('e_indriver').value = item.indriver || "";
            document.getElementById('e_lineman').value = item.lineman || ""; document.getElementById('e_outside').value = item.outside || "";
            document.getElementById('e_mao').value = item.mao || ""; document.getElementById('e_mao_location').value = item.mao_location || "";
            
            if (item.type === "แอป") {
                document.getElementById('airportSection').style.display = 'none'; document.getElementById('e_airport').value = "";
            } else {
                document.getElementById('airportSection').style.display = 'block'; document.getElementById('e_airport').value = item.airport_calc || "";
            }
            document.getElementById('historyList').style.display = 'none'; 
            document.getElementById('slipSection').style.display = 'none';
            document.getElementById('editSection').style.display = 'block'; 
            window.scrollTo(0, 0); 
        }

        function openSlipForm(index, dateStr) {
            const item = currentHistoryData[index]; 
            document.getElementById('slipRow').value = item.row; 
            document.getElementById('slipTimestamp').value = item.timestamp;
            document.getElementById('slipDateDisplay').innerText = dateStr;
            document.getElementById('slip_image').value = ""; 
            
            document.getElementById('historyList').style.display = 'none'; 
            document.getElementById('editSection').style.display = 'none';
            document.getElementById('slipSection').style.display = 'block'; 
            window.scrollTo(0, 0); 
        }

        function getBase64(file) {
            return new Promise((resolve, reject) => {
                const reader = new FileReader();
                reader.readAsDataURL(file);
                reader.onload = () => resolve(reader.result.split(',')[1]); 
                reader.onerror = error => reject(error);
            });
        }

        document.getElementById('editForm').onsubmit = async (e) => {
            e.preventDefault();
            const btn = document.getElementById('btnSubmitEdit');
            const maoValue = Number(document.getElementById('e_mao').value) || 0;
            const maoLoc = document.getElementById('e_mao_location').value.trim();
            
            if (maoValue > 0 && maoLoc === "") {
                showStatus("warning", "กรุณาระบุ 'สถานที่เหมา' ด้วยครับ");
                return;
            }

            btn.disabled = true; 
            showStatus("loading", "กำลังบันทึกยอดแก้ไข...");
            
            const payload = {
                status: "แก้ไขยอด", uid: uid, row: document.getElementById('editRow').value, original_timestamp: document.getElementById('editTimestamp').value,
                grab: document.getElementById('e_grab').value, bolt: document.getElementById('e_bolt').value, maxim: document.getElementById('e_maxim').value,
                indriver: document.getElementById('e_indriver').value, lineman: document.getElementById('e_lineman').value, outside: document.getElementById('e_outside').value,
                mao: document.getElementById('e_mao').value, mao_location: document.getElementById('e_mao_location').value, airport_calc: document.getElementById('e_airport').value
            };
            try {
                const res = await fetch(GAS_URL, { method: 'POST', body: JSON.stringify(payload) });
                const result = await res.json();
                
                statusModal.hide(); 
                if (result.status === "success") { 
                    showStatus("success", "อัปเดตยอดสำเร็จ!");
                    closeForms(); 
                    document.getElementById('loader').style.display = 'block'; 
                    document.getElementById('cardsContainer').innerHTML = ""; 
                    fetchHistory(); 
                } else { 
                    showStatus("error", "เกิดข้อผิดพลาด:<br>" + result.message); 
                }
            } catch (err) { 
                statusModal.hide();
                showStatus("error", "เชื่อมต่อขัดข้อง"); 
            }
            btn.disabled = false;
        };

        window.onload = main;
    </script>
</body>
</html>
