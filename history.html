<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ประวัติและแก้ไขยอด - TaxiEV</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <style>
        body { background-color: #f0f8ff; font-family: 'Kanit', sans-serif; }
        .card { border-radius: 15px; border: none; box-shadow: 0 4px 10px rgba(0,0,0,0.08); margin-bottom: 15px; }
        .btn-edit { background-color: #ffc107; color: #000; font-weight: bold; border-radius: 10px; }
        .btn-submit { background-color: #0d6efd; color: #fff; font-weight: bold; border-radius: 10px; }
        .history-date { font-size: 1.1rem; font-weight: bold; color: #0d6efd; }
        .badge-edit { font-size: 0.75rem; background-color: #dc3545; }
        #editSection { display: none; background: #fff; padding: 20px; border-radius: 15px; box-shadow: 0 -5px 20px rgba(0,0,0,0.15); position: fixed; bottom: 0; left: 0; right: 0; z-index: 1000; max-height: 85vh; overflow-y: auto;}
    </style>
</head>
<body class="p-3">
    <div id="loader" class="text-center py-5"><div class="spinner-border text-primary"></div><p class="mt-2">กำลังดึงประวัติ...</p></div>

    <div id="historyList" style="display: none; padding-bottom: 60px;">
        <h4 class="text-primary fw-bold text-center mb-4">🕒 ประวัติการส่งยอด</h4>
        <div id="cardsContainer"></div>
    </div>

    <div id="editSection">
        <div class="d-flex justify-content-between align-items-center mb-3">
            <h5 class="text-danger fw-bold mb-0">✏️ แก้ไขยอด: <span id="editDateDisplay"></span></h5>
            <button class="btn-close" onclick="closeEditForm()"></button>
        </div>
        <form id="editForm">
            <input type="hidden" id="editRow">
            <input type="hidden" id="editTimestamp">

            <div class="row g-2 mb-2">
                <div class="col-6"><label class="small text-muted">Grab</label><input type="number" id="e_grab" class="form-control"></div>
                <div class="col-6"><label class="small text-muted">Bolt</label><input type="number" id="e_bolt" class="form-control"></div>
                <div class="col-6"><label class="small text-muted">Maxim</label><input type="number" id="e_maxim" class="form-control"></div>
                <div class="col-6"><label class="small text-muted">InDriver</label><input type="number" id="e_indriver" class="form-control"></div>
                <div class="col-6"><label class="small text-muted">LINE MAN</label><input type="number" id="e_lineman" class="form-control"></div>
                <div class="col-6"><label class="small text-muted">งานนอก</label><input type="number" id="e_outside" class="form-control"></div>
                <div class="col-6"><label class="small text-muted">เหมา</label><input type="number" id="e_mao" class="form-control"></div>
                <div class="col-6"><label class="small text-muted">หักเข้าสนามบิน</label><input type="number" id="e_airport" class="form-control"></div>
            </div>
            
            <button type="submit" id="btnSubmitEdit" class="btn btn-submit w-100 mt-3 py-2">บันทึกยอดใหม่</button>
        </form>
    </div>

    <script>
        const LIFF_ID = "2009404765-nezOU6Ri"; 
        const GAS_URL = "https://script.google.com/macros/s/AKfycbxG-5fGF6MFCVeL6i_mo8OL8Nz3uKn5gtEQeeJxbueIBb_Cb3r8d6Ilan9Nxz87UT9onw/exec";
        let uid = "";

        async function main() {
            await liff.init({ liffId: LIFF_ID });
            if (!liff.isLoggedIn()) { liff.login(); return; }
            
            uid = (await liff.getProfile()).userId;
            fetchHistory();
        }

        async function fetchHistory() {
            try {
                // ส่ง POST ไปขอประวัติ
                const res = await fetch(GAS_URL, {
                    method: 'POST',
                    body: JSON.stringify({ status: "ดูประวัติ", uid: uid })
                });
                const data = await res.json();

                if(data.status === "success" && data.history.length > 0) {
                    renderHistory(data.history);
                } else {
                    document.getElementById('cardsContainer').innerHTML = "<p class='text-center text-muted'>ยังไม่มีประวัติการส่งยอดครับ</p>";
                }
                document.getElementById('loader').style.display = 'none';
                document.getElementById('historyList').style.display = 'block';
            } catch(err) {
                alert("โหลดประวัติไม่สำเร็จ");
            }
        }

        function renderHistory(historyArray) {
            const container = document.getElementById('cardsContainer');
            container.innerHTML = "";
            
            historyArray.forEach(item => {
                const editBadge = item.editCount > 0 ? `<span class="badge badge-edit ms-2">แก้ไขครั้งที่ ${item.editCount}</span>` : "";
                
                // แปลงวันที่ให้อ่านง่าย
                const dateObj = new Date(item.date);
                const dateStr = dateObj.toLocaleDateString('th-TH', { day: 'numeric', month: 'short', year: 'numeric' });

                const card = `
                    <div class="card p-3">
                        <div class="d-flex justify-content-between align-items-center mb-2">
                            <span class="history-date">${dateStr} ${editBadge}</span>
                            <button class="btn btn-sm btn-edit px-3" onclick="openEditForm(${item.row}, '${item.timestamp}', '${dateStr}')">แก้ไข</button>
                        </div>
                        <div class="row text-center mt-2">
                            <div class="col-6 border-end">
                                <small class="text-muted d-block">ยอดรวมทั้งหมด</small>
                                <strong class="fs-5 text-dark">${item.totalRev} ฿</strong>
                            </div>
                            <div class="col-6">
                                <small class="text-muted d-block">คงเหลือ (รับจริง)</small>
                                <strong class="fs-5 text-success">${item.driverNet} ฿</strong>
                            </div>
                        </div>
                    </div>
                `;
                container.innerHTML += card;
            });
        }

        function openEditForm(row, timestamp, dateStr) {
            document.getElementById('editRow').value = row;
            document.getElementById('editTimestamp').value = timestamp;
            document.getElementById('editDateDisplay').innerText = dateStr;
            
            // เคลียร์ค่าเก่าในฟอร์ม
            document.querySelectorAll('#editForm input[type="number"]').forEach(input => input.value = "");
            document.getElementById('editSection').style.display = 'block';
        }

        function closeEditForm() {
            document.getElementById('editSection').style.display = 'none';
        }

        document.getElementById('editForm').onsubmit = async (e) => {
            e.preventDefault();
            const btn = document.getElementById('btnSubmitEdit');
            btn.disabled = true;
            btn.innerText = "กำลังบันทึก...";

            const payload = {
                status: "แก้ไขยอด",
                uid: uid,
                row: document.getElementById('editRow').value,
                original_timestamp: document.getElementById('editTimestamp').value,
                grab: document.getElementById('e_grab').value,
                bolt: document.getElementById('e_bolt').value,
                maxim: document.getElementById('e_maxim').value,
                indriver: document.getElementById('e_indriver').value,
                lineman: document.getElementById('e_lineman').value,
                outside: document.getElementById('e_outside').value,
                mao: document.getElementById('e_mao').value,
                airport_calc: document.getElementById('e_airport').value
            };

            try {
                const response = await fetch(GAS_URL, { method: 'POST', body: JSON.stringify(payload) });
                const result = await response.json();

                if (result.status === "success") {
                    alert(`อัปเดตยอดสำเร็จ! (แก้ไขครั้งที่ ${result.editCount})`);
                    closeEditForm();
                    document.getElementById('loader').style.display = 'block';
                    document.getElementById('historyList').style.display = 'none';
                    fetchHistory(); // โหลดข้อมูลใหม่
                } else {
                    alert("แจ้งเตือน: " + result.message);
                }
            } catch (err) {
                alert("เชื่อมต่อขัดข้อง");
            } finally {
                btn.disabled = false;
                btn.innerText = "บันทึกยอดใหม่";
            }
        };

        window.onload = main;
    </script>
</body>
</html>
